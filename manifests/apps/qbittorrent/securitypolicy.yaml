apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: qbittorrent-oidc
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: qbittorrent-https
  oidc:
    provider:
      issuer: https://iam.example.com/auth/v1/
    clientIDRef:
      name: qbittorrent-oidc-secret
    clientSecret:
      name: qbittorrent-oidc-secret
    redirectURL: https://qbittorrent.example.com/oauth2/callback
    logoutPath: /logout
