apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: syncthing-https
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: gateway
      namespace: envoy-gateway-system
      sectionName: https
  hostnames:
    - syncthing.example.com
  rules:
    - backendRefs:
      - group: ''
        kind: Service
        name: syncthing
        port: 8384
        weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /
