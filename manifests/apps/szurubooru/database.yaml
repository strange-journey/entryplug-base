apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: szurubooru-postgres
spec:
  instances: 1
  bootstrap:
    initdb:
      database: szurubooru
      owner: szurubooru
      secret:
        name: szurubooru-postgres
  storage:
    storageClass: local-path
    size: 10Gi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 1Gi
