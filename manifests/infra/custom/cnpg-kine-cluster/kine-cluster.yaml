apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: kine-pg
spec:
  instances: 3

  postgresql:
    parameters:
      max_connections: "200"
      shared_buffers: "256MB"
      wal_level: "replica"
    pg_hba:
      - hostnossl all all all reject
      - hostssl all all all cert

  bootstrap:
    initdb:
      database: kine
      owner: kine

  storage:
    size: 10Gi
    storageClass: local-path

  resources:
    requests:
      memory: 512Mi
      cpu: 500m
    limits:
      memory: 2Gi
