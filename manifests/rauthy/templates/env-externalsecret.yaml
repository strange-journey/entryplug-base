apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: rauthy-env-external-secret
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: oci-vault
    kind: ClusterSecretStore

  target:
    name: rauthy-env-secret
    creationPolicy: Owner
    deletionPolicy: Retain

  dataFrom:
  - extract:
      conversionStrategy: Default	
      decodingStrategy: None
      metadataPolicy: None
      key: {{ .Values.vaultEnvSecretKey }}